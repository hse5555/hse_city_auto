<title>بصمة رقمية v2 | سوق المعدات الثقيلة — مصر</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=IBM+Plex+Sans:wght@300;400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">

/* ═══════════════════════════════════════════
   THEME SYSTEM — 4 themes via CSS variables
═══════════════════════════════════════════ */

<script>
  // إعداد كلمة المرور - يمكنك تغييرها هنا
  const MASTER_KEY = "HESHAM_2026"; 

  function checkAccess() {
    const sessionActive = sessionStorage.getItem("isAuthorized");
    if (sessionActive === "true") return;

    const body = document.querySelector('body');
    body.style.display = 'none'; // إخفاء المحتوى تماماً

    const password = prompt("الوصول مقيد | أدخل كلمة المرور للدخول إلى بصمة إنتنترا الرقمية:");
    
    if (password === MASTER_KEY) {
      sessionStorage.setItem("isAuthorized", "true");
      body.style.display = 'block';
    } else {
      alert("عذراً، الوصول غير مصرح به.");
      window.location.href = "https://github.com/hse5555"; // تحويل المتطفل لمكان آخر
    }
  }
  
  // التشغيل فور تحميل الصفحة
  document.addEventListener("DOMContentLoaded", checkAccess);
</script>
<style>
  /* ضمان عدم ظهور أي جزء من الصفحة قبل التأكد من الهوية */
  body { display: none; }
</style>
</head>
